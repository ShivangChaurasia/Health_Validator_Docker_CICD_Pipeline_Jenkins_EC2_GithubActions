name: Deploy Node App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy Application on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # Clone repo if not already present
            if [ ! -d "Health-Validator-Docker-CICD-Pipeline_Jenkins_EC2_GithubActions" ]; then
              git clone https://github.com/YOUR_USERNAME/YOUR_REPOSITORY.git
            fi

            # Move into project directory
            cd Health-Validator-Docker-CICD-Pipeline_Jenkins_EC2_GithubActions

            # Pull latest code
            git pull origin main

            # Stop old container if exists
            docker stop healthvalidator-container || true

            # Remove old container
            docker rm healthvalidator-container || true

            # Remove old image
            docker rmi healthvalidator-app || true

            # Build fresh Docker image
            docker build -t healthvalidator-app .

            # Run container
            docker run -d -p 3000:3000 \
              --name healthvalidator-container \
              healthvalidator-app

            # Verify running container
            docker ps
