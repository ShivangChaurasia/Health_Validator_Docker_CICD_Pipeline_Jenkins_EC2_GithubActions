name: Deploy Node App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            # Remove old project if exists
            rm -rf Health_Validator_Docker_CICD_Pipeline_Jenkins_EC2_GithubActions || true

            # Clone latest repository
            git clone https://github.com/ShivangChaurasia/Health_Validator_Docker_CICD_Pipeline_Jenkins_EC2_GithubActions.git

            # Move into project
            cd Health_Validator_Docker_CICD_Pipeline_Jenkins_EC2_GithubActions

            # Stop existing container
            docker stop healthvalidator-container || true

            # Remove existing container
            docker rm healthvalidator-container || true

            # Remove old image
            docker rmi healthvalidator-app || true

            # Build Docker image
            docker build -t healthvalidator-app .

            # Run new container
            docker run -d -p 3000:3000 \
              --name healthvalidator-container \
              healthvalidator-app

            # Show running containers
            docker ps
